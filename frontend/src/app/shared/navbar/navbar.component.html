<nav class="main-nav">
  <a class="brand" routerLink="/profile">SkinMatch</a>

  <div class="nav-links">
    @if (!auth.isLoggedIn()) {
      <a routerLink="/login" routerLinkActive="active">Login</a>
    }

    @if (auth.isLoggedIn()) {
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
      <a routerLink="/recommendations" routerLinkActive="active">Recommendations</a>
      <button type="button" class="logout-link" (click)="logout()">Logout</button>
    }
  </div>
</nav>
